<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Add Menu</title>
  </head>

  <body>
    <h1>Add New Menu Item</h1>

    <form th:action="@{/save}" th:object="${menuItem}" method="post">
      <label>Menu Name:</label>
      <input type="text" th:field="*{name}" required />
      <br /><br />

      <label>Category:</label>
      <input type="text" th:field="*{category}" required />
      <br /><br />

      <label>Price:</label>
      <input type="number" step="0.01" th:field="*{price}" required />
      <br /><br />

      <label>Availability:</label>

      <select th:field="*{availability}">
        <option value="Available">Available</option>

        <option value="Unavailable">Unavailable</option>
      </select>

      <br /><br />

      <button type="submit">Save Menu</button>
    </form>

    <br />

    <a href="/menu"> Back to Menu List </a>
  </body>
</html>
